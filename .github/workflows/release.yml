name: release
on:
  push:
    tags: ['v*']

# Required so the workflow's GITHUB_TOKEN can create the release record and
# upload bundle artifacts to it. Repository-default token permissions are
# read-only since GitHub's 2023 hardening change; without this block both
# `tauri-action` (release create) and `gh release upload` fail with
# "Resource not accessible by integration".
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            bundles: app,dmg,updater
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,updater
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'Unsigned build — see README for first-launch instructions on each OS.'
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # tauri-action's own updater-artifact matching has repeatedly missed the
      # bundler-produced .sig files ("Signature not found for the updater
      # JSON. Skipping upload..."), leaving the release without the assets the
      # updater manifest needs. Upload them explicitly instead. Names are
      # normalized (spaces → dots) so manifest URLs need no escaping.
      - name: Upload updater artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd "src-tauri/target/${{ matrix.target }}/release/bundle"
          staging="$(mktemp -d)"
          found=0
          while IFS= read -r -d '' f; do
            found=1
            base="$(basename "$f")"
            cp "$f" "$staging/${base// /.}"
          done < <(
            find . -type f \( -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' -o -name '*.nsis.zip' -o -name '*.nsis.zip.sig' \) -print0
          )
          if [ "$found" -eq 0 ]; then
            echo "::error::no updater artifacts produced (expected .app.tar.gz/.sig or .nsis.zip/.sig)"
            exit 1
          fi
          ls -la "$staging"
          gh release upload "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --clobber \
            "$staging"/*

  compose-manifest:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir artifacts \
            --pattern '*.app.tar.gz*' \
            --pattern '*.nsis.zip*'

      - name: Compose latest.json
        run: |
          node scripts/generate-latest-json.mjs \
            --tag "${{ github.ref_name }}" \
            --dir artifacts \
            --repo "${{ github.repository }}" > artifacts/latest.json
          cat artifacts/latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            artifacts/latest.json \
            --repo "${{ github.repository }}" \
            --clobber
